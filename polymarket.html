<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Quartal4 Tracker</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
padding:25px;
}

.container{max-width:1400px;margin:auto}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.add{
width:50px;height:50px;border-radius:50%;
background:#22c55e;border:none;color:white;
font-size:24px;cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#1e293b;
}

td,th{
padding:12px;
border-bottom:1px solid #334155;
}

tr:hover{background:#273449;cursor:pointer}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
width:350px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#334155;
color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📈 Tracker</h1>
<button class="add" id="addBtn">+</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Stake</th>
<th>Buy</th>
<th>Sell</th>
<th>P/L</th>
<th>Status</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<!-- ADD -->
<div class="modal" id="addModal">
<div class="box">
<h3>Neue Wette</h3>
<input id="tradeName" placeholder="Name">
<input id="stake" type="number" placeholder="Einsatz">
<input id="buyPrice" type="number" step="0.01" placeholder="Buy Price">
<button id="saveBtn">Speichern</button>
</div>
</div>

<!-- CLOSE -->
<div class="modal" id="closeModal">
<div class="box">
<h3>Schließen</h3>
<input id="sellPrice" type="number" step="0.01">
<button id="closeBtn">OK</button>
</div>
</div>

<script type="module">

import { createClient }
from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://zzvulfblktieryljafjl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dnVsZmJsa3RpZXJ5bGphZmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODYwMTgsImV4cCI6MjA5NjY2MjAxOH0.FSvmZxvwISmBuYkrIoJ8toIqp5pVh1rsA4xP6UdSBQo";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let selected = null;

/* MODALS */
const addModal = document.getElementById("addModal");
const closeModal = document.getElementById("closeModal");

document.getElementById("addBtn").onclick = () => {
addModal.style.display = "flex";
};

/* LOAD */
async function load(){

const {data, error} = await supabase
.from("polymarket_trades")
.select("*")
.order("created_at",{ascending:false});

if(error){
console.log("LOAD ERROR:", error);
return;
}

const body = document.getElementById("body");
body.innerHTML = "";

data.forEach(t => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${t.trade_name}</td>
<td>${t.stake}</td>
<td>${t.buy_price}</td>
<td>${t.sell_price ?? "-"}</td>
<td>${t.profit_dollar ?? "-"}</td>
<td>${t.status}</td>
`;

if(t.status === "open"){
row.onclick = () => {
selected = t;
closeModal.style.display = "flex";
};
}

body.appendChild(row);

});
}

/* ADD (FIXED) */
document.getElementById("saveBtn").onclick = async () => {

const payload = {
trade_name: document.getElementById("tradeName").value,
stake: Number(document.getElementById("stake").value),
buy_price: Number(document.getElementById("buyPrice").value),
status: "open"
};

const { error } = await supabase
.from("polymarket_trades")
.insert([payload]);   // ✅ ARRAY WICHTIG

if(error){
console.log("INSERT ERROR:", error);
alert(JSON.stringify(error));
return;
}

addModal.style.display = "none";
load();
};

/* CLOSE */
document.getElementById("closeBtn").onclick = async () => {

const sell = Number(document.getElementById("sellPrice").value);

const profitPercent =
((sell / selected.buy_price) - 1) * 100;

const profitDollar =
selected.stake * (profitPercent / 100);

const { error } = await supabase
.from("polymarket_trades")
.update({
sell_price: sell,
profit_dollar: profitDollar.toFixed(2),
profit_percent: profitPercent.toFixed(2),
status: "closed"
})
.eq("id", selected.id);

if(error){
console.log("UPDATE ERROR:", error);
alert(JSON.stringify(error));
return;
}

closeModal.style.display = "none";
load();
};

load();

</script>

</body>
</html>
