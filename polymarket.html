<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Quartal4 Polymarket Tracker</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
padding:25px;
}

.container{max-width:1400px;margin:auto}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

h1{font-size:32px}

.add{
background:#22c55e;
color:white;
font-size:22px;
width:45px;
height:45px;
border-radius:50%;
border:none;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
}

tr:hover{background:#273449;cursor:pointer}

.profit{color:#22c55e}
.loss{color:#ef4444}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
}

.modal-box{
background:#1e293b;
padding:20px;
border-radius:12px;
width:350px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#334155;
color:white;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>📈 Quartal4 Tracker</h1>
<button class="add" id="addBtn">+</button>
</div>

<div class="stats">
<div class="card">Profit<br><b id="profit">$0</b></div>
<div class="card">ROI<br><b id="roi">0%</b></div>
<div class="card">Open<br><b id="open">0</b></div>
<div class="card">Closed<br><b id="closed">0</b></div>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Stake</th>
<th>Buy</th>
<th>Sell</th>
<th>P/L $</th>
<th>P/L %</th>
<th>Status</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<!-- ADD -->
<div class="modal" id="addModal">
<div class="modal-box">
<h3>Neue Wette</h3>
<input id="tradeName" placeholder="Name">
<input id="stake" type="number" placeholder="Einsatz">
<input id="buyPrice" type="number" step="0.01" placeholder="Kaufpreis">
<button id="saveBtn">Speichern</button>
</div>
</div>

<!-- CLOSE -->
<div class="modal" id="closeModal">
<div class="modal-box">
<h3>Trade schließen</h3>
<input id="sellPrice" type="number" step="0.01">
<button id="closeBtn">Schließen</button>
</div>
</div>

<script type="module">

import { createClient }
from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://zzvulfblktieryljafjl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dnVsZmJsa3RpZXJ5bGphZmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODYwMTgsImV4cCI6MjA5NjY2MjAxOH0.FSvmZxvwISmBuYkrIoJ8toIqp5pVh1rsA4xP6UdSBQo";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let selected = null;

/* MODALS */
const addModal = document.getElementById("addModal");
const closeModal = document.getElementById("closeModal");

/* BUTTONS */
document.getElementById("addBtn").onclick = () => {
addModal.style.display = "flex";
};

/* LOAD */
async function load(){

const {data, error} = await supabase
.from("polymarket_trades")
.select("*")
.order("created_at",{ascending:false});

if(error){
console.log("SUPABASE ERROR:", error);
return;
}

const body = document.getElementById("body");
body.innerHTML = "";

let profit = 0;
let stake = 0;
let open = 0;
let closed = 0;

data.forEach(t => {

if(t.status === "open") open++;
else closed++;

profit += Number(t.profit_dollar || 0);
stake += Number(t.stake || 0);

const row = document.createElement("tr");

row.innerHTML = `
<td>${t.trade_name}</td>
<td>${t.stake}</td>
<td>${t.buy_price}</td>
<td>${t.sell_price ?? "-"}</td>
<td class="${t.profit_dollar >= 0 ? "profit":"loss"}">
${t.profit_dollar ?? "-"}
</td>
<td class="${t.profit_percent >= 0 ? "profit":"loss"}">
${t.profit_percent ?? "-"}
</td>
<td>${t.status}</td>
`;

if(t.status === "open"){
row.onclick = () => {
selected = t;
closeModal.style.display = "flex";
};
}

body.appendChild(row);

});

document.getElementById("profit").innerText = "$"+profit.toFixed(2);
document.getElementById("roi").innerText =
stake ? ((profit/stake)*100).toFixed(2)+"%" : "0%";
document.getElementById("open").innerText = open;
document.getElementById("closed").innerText = closed;
}

/* ADD */
document.getElementById("saveBtn").onclick = async () => {

await supabase.from("polymarket_trades").insert({
trade_name: document.getElementById("tradeName").value,
stake: Number(document.getElementById("stake").value),
buy_price: Number(document.getElementById("buyPrice")?.value || 0),
status: "open"
});

addModal.style.display = "none";
load();
};

/* CLOSE */
document.getElementById("closeBtn").onclick = async () => {

const sell = Number(document.getElementById("sellPrice").value);

const profitPercent =
((sell / selected.buy_price) - 1) * 100;

const profitDollar =
selected.stake * (profitPercent / 100);

await supabase.from("polymarket_trades")
.update({
sell_price: sell,
profit_dollar: profitDollar.toFixed(2),
profit_percent: profitPercent.toFixed(2),
status: "closed"
})
.eq("id", selected.id);

closeModal.style.display = "none";
load();
};

load();

</script>

</body>
</html>
