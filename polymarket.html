<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Antonia</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
--bg:#09090b;--card:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;
--green:#22c55e;--red:#ef4444;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}
.container{max-width:1400px;margin:auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.btn{background:#27272a;color:white;border:none;padding:10px 14px;border-radius:12px;cursor:pointer}
.btn-green{background:#22c55e}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.stat{padding:16px}.muted{color:#a1a1aa;font-size:12px}.big{font-size:28px;font-weight:bold}
.chart-card{height:240px;padding:16px;margin-top:16px}
#equityChart{width:100%!important;height:240px!important}
.toolbar{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
input,select{background:#27272a;color:white;border:1px solid #3f3f46;border-radius:10px;padding:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #27272a;text-align:left}
tr:hover{background:#202024}
.profit{color:#22c55e}.loss{color:#ef4444}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center}
.modalbox{width:420px;max-width:95%;padding:20px}
label{display:block;margin-top:10px;margin-bottom:4px;color:#a1a1aa}
.modalbox input{width:100%;box-sizing:border-box}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>📈 Quartal4 Polymarket Tracker</h1>
<div>
<button class="btn" id="exportBtn">CSV</button>
<button class="btn btn-green" id="addBtn">+ Neuer Trade</button>
</div>
</div>

<div class="stats">
<div class="card stat"><div class="muted">ROI</div><div id="roi" class="big">0.00%</div></div>
<div class="card stat"><div class="muted">Total Profit</div><div id="profit" class="big">$0.00</div></div>
<div class="card stat"><div class="muted">Open Trades</div><div id="open" class="big">0</div></div>
<div class="card stat"><div class="muted">Closed Trades</div><div id="closed" class="big">0</div></div>
<div class="card stat"><div class="muted">Startkapital</div><div id="start" class="big">$100.00</div></div>
</div>

<div class="card chart-card"><canvas id="equityChart"></canvas></div>

<div class="toolbar">
<input id="search" placeholder="Trade suchen...">
<select id="filter">
<option value="all">Alle</option>
<option value="open">Offen</option>
<option value="closed">Geschlossen</option>
</select>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Balance Vorher</th>
<th>Wette</th>
<th>Einsatz</th>
<th>Kauf</th>
<th>Verkauf</th>
<th>Profit $</th>
<th>Profit %</th>
<th>Balance Nachher</th>
<th>Status</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>
</div>

<div class="modal" id="addModal"><div class="card modalbox">
<h3>Neue Wette</h3>
<label>Name der Wette</label><input id="tradeName">
<label>Einsatz ($)</label><input id="stake" type="number">
<label>Kaufpreis pro Share (¢)</label><input id="buyPrice" type="number" step="0.01">
<label>Auszahlung bei Erfolg ($)</label><input id="payout" type="number">
<button class="btn btn-green" id="saveBtn" style="margin-top:12px">Speichern</button>
</div></div>

<div class="modal" id="closeModal"><div class="card modalbox">
<h3>Trade schließen</h3>
<label>Verkaufspreis pro Share (¢)</label><input id="sellPrice" type="number" step="0.01">
<button class="btn btn-green" id="closeBtn" style="margin-top:12px">Trade schließen</button>
</div></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://zzvulfblktieryljafjl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dnVsZmJsa3RpZXJ5bGphZmpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODYwMTgsImV4cCI6MjA5NjY2MjAxOH0.FSvmZxvwISmBuYkrIoJ8toIqp5pVh1rsA4xP6UdSBQo";
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

const START_CAPITAL = 100;

let chart=null, selected=null;

const addModal=document.getElementById("addModal");
const closeModal=document.getElementById("closeModal");

document.getElementById("start").innerText ="$" + START_CAPITAL.toFixed(2);

document.getElementById("addBtn").onclick=()=>addModal.style.display="flex";

window.onclick=(e)=>{
 if(e.target===addModal) addModal.style.display="none";
 if(e.target===closeModal) closeModal.style.display="none";
};

async function load(){
 const {data,error}=await supabase.from("polymarket_trades").select("*").order("created_at");
 if(error){alert(error.message);return;}

 const search=document.getElementById("search").value.toLowerCase();
 const filter=document.getElementById("filter").value;

let runningBalance = START_CAPITAL;
 const sorted=[...data].filter(t=>t.status==="closed")
 .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

 sorted.forEach(t=>{
   t.balanceBefore=runningBalance;
   runningBalance+=Number(t.profit_dollar||0);
   t.balanceAfter=runningBalance;
 });

 const balanceMap={};
 sorted.forEach(t=>balanceMap[t.id]=t);

 const body=document.getElementById("body");
 body.innerHTML="";

 let totalProfit=0,totalStake=0,open=0,closed=0;

 const labels=sorted.map(t=>new Date(t.created_at).toLocaleDateString("de-DE"));
 const curve=sorted.map(t=>t.balanceAfter);

 data.filter(t=>{
   if(filter!=="all" && t.status!==filter) return false;
   if(search && !t.trade_name.toLowerCase().includes(search)) return false;
   return true;
 }).forEach(t=>{

   if(t.status==="open") open++; else closed++;
   totalProfit+=Number(t.profit_dollar||0);
   totalStake+=Number(t.stake||0);

   const bal=balanceMap[t.id];

   const tr=document.createElement("tr");
   tr.innerHTML=`
   <td>${bal ? "$"+bal.balanceBefore.toFixed(2) : "-"}</td>
   <td>${t.trade_name}</td>
   <td>$${Number(t.stake||0).toFixed(2)}</td>
   <td>${Number(t.buy_price||0).toFixed(2)}¢</td>
   <td>${t.sell_price ? Number(t.sell_price).toFixed(2)+"¢" : "-"}</td>
   <td class="${Number(t.profit_dollar)>=0?'profit':'loss'}">${t.profit_dollar!==null ? "$"+Number(t.profit_dollar).toFixed(2) : "-"}</td>
   <td class="${Number(t.profit_percent)>=0?'profit':'loss'}">${t.profit_percent!==null ? Number(t.profit_percent).toFixed(2)+"%" : "-"}</td>
   <td>${bal ? "$"+bal.balanceAfter.toFixed(2) : "-"}</td>
   <td>${t.status}</td>`;

   if(t.status==="open"){
      tr.onclick=()=>{selected=t;closeModal.style.display="flex";};
   }

   body.appendChild(tr);
 });

 document.getElementById("profit").innerText="$"+totalProfit.toFixed(2);
 document.getElementById("roi").innerText=(totalStake?totalProfit/totalStake*100:0).toFixed(2)+"%";
 document.getElementById("open").innerText=open;
 document.getElementById("closed").innerText=closed;

 const ctx=document.getElementById("equityChart");
 if(chart) chart.destroy();
 chart=new Chart(ctx,{
  type:"line",
  data:{labels,datasets:[{label:"Balance over Time",data:curve}]},
  options:{responsive:true,maintainAspectRatio:false, scales: {y: {suggestedMin: 0}}}
 });
}

document.getElementById("saveBtn").onclick=async()=>{
 const {error}=await supabase.from("polymarket_trades").insert([{
  trade_name:tradeName.value,
  stake:Number(stake.value),
  buy_price:Number(buyPrice.value),
  payout_if_win:Number(payout.value||0),
  status:"open"
 }]);
 if(error){alert(error.message);return;}
 addModal.style.display="none";
 load();
};

document.getElementById("closeBtn").onclick=async()=>{
 const sell=Number(sellPrice.value);
 const shares=selected.stake/selected.buy_price;
 const profitDollar=(shares*sell)-selected.stake;
 const profitPercent=(profitDollar/selected.stake)*100;

 const {error}=await supabase.from("polymarket_trades").update({
  sell_price:sell,
  profit_dollar:profitDollar,
  profit_percent:profitPercent,
  status:"closed"
 }).eq("id",selected.id);

 if(error){alert(error.message);return;}
 closeModal.style.display="none";
 load();
};

document.getElementById("search").oninput=load;
document.getElementById("filter").onchange=load;

load();
</script>
</body>
</html>
